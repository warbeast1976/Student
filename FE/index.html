<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="School attendance, absence reports, and class portal for students, teachers, and administrators.">
  <meta name="theme-color" content="#0d9488">
  <title>MLGCL — School Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <button type="button" id="skip-to-content" class="skip-link">Skip to main content</button>
  <div id="global-progress" class="global-progress" aria-hidden="true"></div>
  <div class="bg-decor bg-decor-a" aria-hidden="true"></div>
  <div class="bg-decor bg-decor-b" aria-hidden="true"></div>
  <div id="global-loading" class="global-loading" aria-live="polite" aria-busy="false">
    <div class="global-loading-inner">
      <span class="spinner" aria-hidden="true"></span>
      <span>Loading…</span>
    </div>
  </div>
  <main id="app" tabindex="-1" aria-label="Main content"></main>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-relevant="additions"></div>
  <script>window.__SARS_CONFIG__ = window.__SARS_CONFIG__ || {};</script>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
